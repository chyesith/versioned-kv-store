name: Java CI/CD production pipeline
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Build-Test-analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: kvstore
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache sonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and Verify with  Maven
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kvstore
          SPRING_DATASOURCE_USERNAME: dev_user
          SPRING_DATASOURCE_PASSWORD: dev_password
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          ./mvnw -B verify 
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar
          -Dsonar.projectKey=versioned-kv-store  
          -Dsonar.organization=chyesith
          -Dsonar.host.url=https://sonarcloud.io
