name: Java CI/CD production pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build-Test-Analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kvstore
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build, test and analyze
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kvstore
          SPRING_DATASOURCE_USERNAME: dev_user
          SPRING_DATASOURCE_PASSWORD: dev_password
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >-
          ./mvnw -B verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar
          -Dsonar.projectKey=versioned-kv-store
          -Dsonar.organization=chyesith
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Publish coverage summary
        if: always()
        run: |
          echo "## JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f target/site/jacoco/jacoco.xml ]; then
            echo ":warning: jacoco.xml not found — verify phase may have failed" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          extract() {
            TYPE=$1
            grep -o "type=\"$TYPE\"[^/]*/>" target/site/jacoco/jacoco.xml | \
            head -1 | grep -o 'missed="[0-9]*" covered="[0-9]*"' | \
            awk -F'"' '{
              missed=$2; covered=$4; total=missed+covered
              if(total>0) printf "%.1f", (covered/total)*100
              else print "0.0"
            }'
          }

          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|:--------:|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $(extract LINE)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | $(extract BRANCH)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Methods | $(extract METHOD)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Classes | $(extract CLASS)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Instructions | $(extract INSTRUCTION)% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Full HTML report available in the **jacoco-html-report** artifact above" >> $GITHUB_STEP_SUMMARY

      - name: Post coverage comment on PR
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: Code Coverage Report
          update-comment: true

  deploy:
    name: Deploy to Render
    needs: build
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deployment
        run: |
          curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deployment hook triggered successfully!"